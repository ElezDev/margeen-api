[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force --seed && php artisan config:cache && php artisan route:cache && php artisan view:cache && (php artisan storage:link || true) && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
